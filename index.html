<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Krisna Bou | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; background: var(--bg-page); font-family: var(--font-sans); color: var(--text-body); }
  a { color: inherit; }
  .timeline-spine { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 3px; height: 100%; background: linear-gradient(to bottom, var(--stem) 0%, var(--stem) 82%, transparent 100%); z-index: 0; pointer-events: none; }
  .timeline-dot { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 25px; height: 25px; border-radius: 50%; background: var(--stem); z-index: 1; pointer-events: none; }
  .tech-icon { transition: var(--ease-lift); }
  .tech-icon:hover { transform: scale(var(--scale-icon)); }
  /* Laptop render is a transparent mockup — never frame it with the accent border. */
  img[src$="laptop.png"] { border: none !important; border-radius: 0 !important; }
  .float-photo { animation: float 6s ease-in-out infinite; }
  @keyframes float {
    0%   { box-shadow: 0 5px 15px 0 rgba(0,0,0,.6); transform: translateY(0); }
    50%  { box-shadow: 0 25px 15px 0 rgba(0,0,0,.2); transform: translateY(-20px); }
    100% { box-shadow: 0 5px 15px 0 rgba(0,0,0,.6); transform: translateY(0); }
  }
  /* Animated scroll-down arrow */
  .scroll-arrow { display:block; width:10px; height:38px; position:relative; }
  .scroll-arrow:after { content:""; display:block; width:8px; height:8px; border-top:3px solid #fff; border-right:3px solid #fff; transform: rotate(135deg); }
  /* Vanta network sections: guarantee the canvas fills the section and never
     flashes white if the WebGL canvas is briefly mis-sized. */
  #vanta-hero, #vanta-contact { background: var(--bg-network); }
  #vanta-hero > .vanta-canvas, #vanta-contact > .vanta-canvas {
    position: absolute !important; top: 0; left: 0;
    width: 100% !important; height: 100% !important;
  }
  @media (max-width: 750px) {
    .timeline-spine, .timeline-dot { display: none; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="ds_bundle.js"></script>
<script src="data.js"></script>
</head>
